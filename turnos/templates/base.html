<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Barbería{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #2f2f2f; color: white; }
        .navbar { background-color: #1e7e34; }
        .btn-success { background-color: #1e7e34; border: none; }
        .btn-success:hover { background-color: #155724; }
        .form-control, .form-select { background-color: #2f2f2f; border: 1px solid #555; color: white; }
        .form-control:focus, .form-select:focus { background-color: #2f2f2f; color: white; border-color: #1e7e34; box-shadow: 0 0 0 0.2rem rgba(30,126,52,.3); }
        .form-control::placeholder { color: #aaa; }
        .form-label { color: #aaa; font-size: 0.9rem; }
        .search-input { background-color: #155724; border: 1px solid #aaa; color: white; border-radius: 6px; padding: 4px 10px; font-size: 0.9rem; width: 180px; }
        .search-input::placeholder { color: #ccc; }
        option { background-color: #2f2f2f; }
        {% block extra_styles %}{% endblock %}
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand text-white fw-bold" href="{% url 'turnos:home' %}">✂️ Barbería</a>
        <div class="d-flex align-items-center gap-3 ms-auto">
            <a class="text-white text-decoration-none" href="{% url 'turnos:about' %}">About</a>
            <a class="text-white text-decoration-none" href="{% url 'turnos:horarios' %}">Horarios</a>
            {% if user.is_authenticated %}
            <a class="text-white text-decoration-none" href="{% url 'mensajes:bandeja_entrada' %}">Mensajes</a>
            <a class="text-white text-decoration-none" href="{% url 'accounts:perfil' %}">Perfil</a>
            {% endif %}
            <form method="GET" action="{% url 'turnos:buscar' %}" class="d-flex align-items-center gap-2">
                <input type="text" name="nombre" class="search-input" placeholder="Buscar turno...">
                <button type="submit" class="btn btn-outline-light btn-sm">Buscar</button>
            </form>
            {% if user.is_authenticated %}
            <form method="post" action="{% url 'logout' %}" class="m-0">
                {% csrf_token %}
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
            {% else %}
            <a href="{% url 'login' %}" class="btn btn-outline-light btn-sm">Login</a>
            <a href="{% url 'accounts:registro' %}" class="btn btn-success btn-sm">Registro</a>
            {% endif %}
        </div>
    </div>
</nav>

<!-- MENSAJES DE DJANGO -->
{% if messages %}
<div class="container mt-3">
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
        {{ message }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
</div>
{% endif %}

<!-- CONTENIDO -->
<div class="container mt-4 mb-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
