<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Sesión cerrada - Barbería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2f2f2f;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .logout-container {
            background-color: #3a3a3a;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logout-container h2 {
            margin-bottom: 12px;
        }
        .logout-container p {
            color: #ccc;
            margin-bottom: 24px;
        }
        .btn-success {
            background-color: #1e7e34;
            border: none;
        }
        .btn-success:hover {
            background-color: #155724;
        }
        .btn-outline-light:hover {
            color: #2f2f2f;
        }
    </style>
</head>
<body>
    <div class="logout-container">
        <h2>✂️ Barbería</h2>
        <p>Tu sesión fue cerrada correctamente.</p>
        <a href="/accounts/login/" class="btn btn-success w-100 mb-2">
            Volver a iniciar sesión
        </a>
        <a href="/" class="btn btn-outline-light w-100">
            Ir al inicio
        </a>
    </div>
</body>
</html>
