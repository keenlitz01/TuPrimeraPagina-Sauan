<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Barbería</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #2f2f2f;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background-color: #3a3a3a;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
        }
        .login-container h2 {
            text-align: center;
            margin-bottom: 24px;
        }
        .form-control {
            background-color: #2f2f2f;
            border: 1px solid #555;
            color: white;
            margin-bottom: 12px;
        }
        .form-control:focus {
            background-color: #2f2f2f;
            color: white;
            border-color: #1e7e34;
            box-shadow: 0 0 0 0.2rem rgba(30,126,52,.3);
        }
        .form-control::placeholder {
            color: #aaa;
        }
        .btn-success {
            background-color: #1e7e34;
            border: none;
        }
        .btn-success:hover {
            background-color: #155724;
        }
        .error-msg {
            color: #ff6b6b;
            text-align: center;
            margin-bottom: 12px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>✂️ Barbería</h2>
        <form method="post">
            {% csrf_token %}
            {% if form.errors %}
                <p class="error-msg">Usuario o contraseña incorrectos</p>
            {% endif %}
            <input
                type="text"
                name="username"
                class="form-control"
                placeholder="Usuario"
                autofocus
                required
            >
            <input
                type="password"
                name="password"
                class="form-control"
                placeholder="Contraseña"
                required
            >
            <button type="submit" class="btn btn-success w-100 mt-2">
                Ingresar
            </button>
        </form>
    </div>
</body>
</html>
